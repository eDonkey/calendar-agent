<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agente de Calendario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f14; --surface: #13161e; --surface-2: #1a1e28; --surface-3: #222738;
      --border: rgba(255,255,255,0.07); --border-h: rgba(255,255,255,0.14);
      --accent: #4f8ef7; --accent-soft: rgba(79,142,247,0.12); --accent-glow: rgba(79,142,247,0.25);
      --text: #eef0f6; --text-2: #7e8499; --text-3: #4a4f63;
      --green: #34d399; --red: #f87171; --amber: #fbbf24;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    body { display: flex; flex-direction: column; height: 100vh; }

    header { display: flex; align-items: center; gap: 14px; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .logo { width: 36px; height: 36px; background: linear-gradient(135deg, #4285F4, #34A853 50%, #FBBC05); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo svg { width: 20px; height: 20px; }
    .header-text h1 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; }
    .header-text p { font-size: 12px; color: var(--text-2); margin-top: 1px; }
    .status { margin-left: auto; display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-2); }
    .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    .main { display: flex; flex: 1; overflow: hidden; }

    aside { width: 236px; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; padding: 14px 10px; gap: 3px; flex-shrink: 0; overflow-y: auto; }
    .slabel { font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); padding: 8px 8px 4px; }
    .qbtn { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; border: none; background: transparent; color: var(--text-2); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; text-align: left; width: 100%; transition: all .15s; }
    .qbtn:hover { background: var(--surface-2); color: var(--text); }
    .qbtn .ic { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; background: var(--surface-3); }
    .sdiv { height: 1px; background: var(--border); margin: 7px 0; }

    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }

    .msg { display: flex; gap: 12px; align-items: flex-start; max-width: 800px; }
    .msg.user { flex-direction: row-reverse; margin-left: auto; }
    .av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 2px; }
    .av.a { background: var(--accent-soft); color: var(--accent); border: 1px solid rgba(79,142,247,.2); }
    .av.u { background: var(--surface-3); color: var(--text-2); border: 1px solid var(--border); }
    .bubble { padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.65; max-width: 100%; }
    .msg.agent .bubble { background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; color: var(--text); }
    .msg.user .bubble { background: var(--accent); color: #fff; border-radius: 14px 4px 14px 14px; }

    .elist { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
    .ecard { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 9px; background: var(--surface-3); border: 1px solid var(--border); }
    .ebar { width: 3px; height: 30px; border-radius: 2px; flex-shrink: 0; }
    .einfo { flex: 1; min-width: 0; }
    .etitle { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .emeta { font-size: 11px; color: var(--text-2); margin-top: 2px; font-family: 'DM Mono', monospace; }

    .typing { display: flex; gap: 5px; align-items: center; padding: 13px 16px; }
    .td { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); animation: td 1.3s infinite; }
    .td:nth-child(2){animation-delay:.15s} .td:nth-child(3){animation-delay:.3s}
    @keyframes td { 0%,80%,100%{transform:scale(.7);opacity:.3} 40%{transform:scale(1);opacity:1} }

    .iarea { padding: 12px 18px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
    textarea { flex: 1; resize: none; border: 1px solid var(--border-h); border-radius: 11px; padding: 11px 14px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--surface-2); color: var(--text); outline: none; min-height: 44px; max-height: 110px; line-height: 1.5; transition: border-color .15s; }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-3); }
    .sbtn { width: 42px; height: 42px; border-radius: 11px; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; box-shadow: 0 2px 14px var(--accent-glow); }
    .sbtn:hover { transform: scale(1.05); }
    .sbtn:active { transform: scale(.97); }
    .sbtn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; gap: 14px; }
    .wlogo { width: 60px; height: 60px; background: linear-gradient(135deg,#4285F4,#34A853 50%,#FBBC05); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
    .welcome h2 { font-family: 'Syne', sans-serif; font-size: 21px; font-weight: 600; }
    .welcome p { font-size: 14px; color: var(--text-2); max-width: 320px; line-height: 1.6; }
    .wchips { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; max-width: 420px; margin-top: 6px; }
    .wchip { padding: 7px 13px; border-radius: 20px; border: 1px solid var(--border-h); background: var(--surface-2); color: var(--text-2); font-size: 13px; cursor: pointer; transition: all .15s; }
    .wchip:hover { background: var(--surface-3); color: var(--text); border-color: var(--accent); }

    @media(max-width:640px){ aside{display:none} #messages{padding:14px} }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="18" rx="4" fill="white" opacity=".95"/><path d="M2 9h20" stroke="rgba(0,0,0,.12)" stroke-width="1"/><path d="M8 2v4M16 2v4" stroke="rgba(0,0,0,.3)" stroke-width="2" stroke-linecap="round"/><rect x="6" y="12" width="4" height="3" rx="1" fill="#4285F4"/><rect x="11" y="12" width="4" height="3" rx="1" fill="#34A853"/><rect x="6" y="16" width="4" height="3" rx="1" fill="#FBBC05"/><rect x="11" y="16" width="4" height="3" rx="1" fill="#EA4335"/></svg>
  </div>
  <div class="header-text">
    <h1>Agente de Calendario</h1>
    <p>Google Calendar · CrewAI · Claude</p>
  </div>
  <div class="status"><div class="sdot" id="sdot"></div><span id="stxt">Conectando...</span></div>
</header>

<div class="main">
  <aside>
    <div class="slabel">Ver agenda</div>
    <button class="qbtn" onclick="sq('¿Qué eventos tengo hoy?')"><span class="ic">📅</span> Hoy</button>
    <button class="qbtn" onclick="sq('Mostrame mis eventos de esta semana')"><span class="ic">📆</span> Esta semana</button>
    <button class="qbtn" onclick="sq('¿Qué tengo el próximo mes?')"><span class="ic">🗓</span> Próximo mes</button>
    <div class="sdiv"></div>
    <div class="slabel">Crear</div>
    <button class="qbtn" onclick="sq('Quiero crear un nuevo evento')"><span class="ic">➕</span> Nuevo evento</button>
    <button class="qbtn" onclick="sq('Agendar una reunión')"><span class="ic">🤝</span> Agendar reunión</button>
    <button class="qbtn" onclick="sq('Crear un recordatorio para mañana')"><span class="ic">🔔</span> Recordatorio</button>
    <div class="sdiv"></div>
    <div class="slabel">Gestionar</div>
    <button class="qbtn" onclick="sq('Necesito editar un evento existente')"><span class="ic">✏️</span> Editar evento</button>
    <button class="qbtn" onclick="sq('Quiero cancelar un evento')"><span class="ic">🗑</span> Eliminar evento</button>
    <button class="qbtn" onclick="sq('Buscar eventos con alguien')"><span class="ic">🔍</span> Buscar</button>
  </aside>

  <div class="chat-area">
    <div id="messages">
      <div class="welcome" id="welcome">
        <div class="wlogo"><svg viewBox="0 0 24 24" fill="none" width="32" height="32"><rect x="2" y="4" width="20" height="18" rx="4" fill="white" opacity=".95"/><path d="M2 9h20" stroke="rgba(0,0,0,.12)" stroke-width="1"/><path d="M8 2v4M16 2v4" stroke="rgba(0,0,0,.3)" stroke-width="2" stroke-linecap="round"/><rect x="6" y="12" width="4" height="3" rx="1" fill="#4285F4"/><rect x="11" y="12" width="4" height="3" rx="1" fill="#34A853"/><rect x="6" y="16" width="4" height="3" rx="1" fill="#FBBC05"/><rect x="11" y="16" width="4" height="3" rx="1" fill="#EA4335"/></svg></div>
        <h2>Tu agente de Google Calendar</h2>
        <p>Escribí en lenguaje natural para gestionar tu agenda. Creo, veo, edito y elimino eventos.</p>
        <div class="wchips">
          <button class="wchip" onclick="sq('¿Qué eventos tengo hoy?')">¿Qué tengo hoy?</button>
          <button class="wchip" onclick="sq('Crear reunión mañana a las 10am')">Crear reunión mañana</button>
          <button class="wchip" onclick="sq('¿Tengo algo libre el viernes?')">¿Estoy libre el viernes?</button>
          <button class="wchip" onclick="sq('Ver agenda de esta semana')">Ver esta semana</button>
        </div>
      </div>
    </div>
    <div class="iarea">
      <textarea id="inp" placeholder="Ej: Creá una reunión el martes a las 3pm con Juan..." rows="1"></textarea>
      <button class="sbtn" id="sbtn" onclick="send()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const msgs = document.getElementById('messages');
const inp = document.getElementById('inp');
const sbtn = document.getElementById('sbtn');
const welcome = document.getElementById('welcome');
const history = [];
let busy = false;
const COLORS = ['#4285F4','#34A853','#FBBC05','#EA4335','#9C27B0','#00BCD4','#FF5722'];

inp.addEventListener('input', () => { inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 110) + 'px'; });
inp.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }});

function hideWelcome(){ if(welcome) welcome.style.display='none'; }

function addMsg(role, html, events){
  hideWelcome();
  const d = document.createElement('div');
  d.className = 'msg ' + (role==='user'?'user':'agent');
  const av = document.createElement('div');
  av.className = 'av ' + (role==='user'?'u':'a');
  av.textContent = role==='user'?'Vos':'AI';
  const bw = document.createElement('div');
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = html;
  if(events && events.length){
    const el = document.createElement('div'); el.className='elist';
    events.forEach((ev,i)=>{
      const c = document.createElement('div'); c.className='ecard';
      const col = ev.color||COLORS[i%COLORS.length];
      c.innerHTML=`<div class="ebar" style="background:${col}"></div><div class="einfo"><div class="etitle">${ev.title}</div><div class="emeta">${ev.time}${ev.location?' · 📍 '+ev.location:''}</div></div>`;
      el.appendChild(c);
    });
    b.appendChild(el);
  }
  bw.appendChild(b); d.appendChild(av); d.appendChild(bw);
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  const d=document.createElement('div'); d.className='msg agent'; d.id='typing';
  d.innerHTML=`<div class="av a">AI</div><div><div class="bubble typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
}
function removeTyping(){ const t=document.getElementById('typing'); if(t)t.remove(); }

function setbusy(v){ busy=v; sbtn.disabled=v; inp.disabled=v; }

function parseEvents(text){
  const m=text.match(/\{"events"\s*:\s*(\[[\s\S]*?\])\}/);
  if(!m) return {text,events:null};
  try{ const events=JSON.parse(m[1]); return {text:text.replace(m[0],'').trim(),events}; }
  catch{ return {text,events:null}; }
}

async function send(){
  const msg=inp.value.trim(); if(!msg||busy) return;
  inp.value=''; inp.style.height='auto'; setbusy(true);
  addMsg('user', msg.replace(/\n/g,'<br>'));
  history.push({role:'user',content:msg});
  showTyping();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,history:history.slice(-10)})});
    removeTyping();
    const data=await res.json();
    if(data.success){
      const {text,events}=parseEvents(data.response);
      addMsg('agent', text.replace(/\n/g,'<br>'), events);
      history.push({role:'assistant',content:data.response});
    } else {
      addMsg('agent', `⚠️ ${data.error||'Error inesperado.'}`);
    }
  } catch(e){
    removeTyping();
    addMsg('agent','⚠️ No pude conectar con el servidor. Revisá los logs con <code>heroku logs --tail</code>');
    document.getElementById('sdot').style.cssText='background:#f87171;box-shadow:none';
    document.getElementById('stxt').textContent='Sin conexión';
  } finally { setbusy(false); inp.focus(); }
}

function sq(t){ inp.value=t; send(); }

// Health check
(async()=>{
  try{
    const r=await fetch('/api/health'); const d=await r.json();
    const ok=Object.values(d.configured).every(Boolean);
    document.getElementById('sdot').style.background = ok?'#34d399':'#fbbf24';
    document.getElementById('stxt').textContent = ok?'Conectado':'Config. incompleta';
  } catch{
    document.getElementById('sdot').style.cssText='background:#f87171;box-shadow:none';
    document.getElementById('stxt').textContent='Sin conexión';
  }
})();
</script>
</body>
</html>
